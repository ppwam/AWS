<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台股強勢漲停監控 | Workspace Hub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Premium glowing background accents -->
    <div class="glow-blob blob-purple"></div>
    <div class="glow-blob blob-blue"></div>
    <div class="glow-blob blob-teal"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div>
                    <h1>Workspace Hub</h1>
                    <p class="subtitle">System Realtime Performance Monitor</p>
                </div>
            </div>

            <!-- Multi-tab Navigation Bar -->
            <nav class="app-nav">
                <a href="/" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span>系統監控</span>
                </a>
                <a href="/feature1" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trending-up"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                    <span>台股漲停看板</span>
                </a>
                <a href="/feature2" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building-2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M6 18h12"/><path d="M6 14h12"/><path d="M6 10h12"/><path d="M6 6h12"/></svg>
                    <span>下午上班公司</span>
                </a>
            </nav>
            
            <div class="header-status">
                <div class="status-indicator">
                    <span class="status-dot online" id="statusDot"></span>
                    <span class="status-text" id="statusText">連線正常</span>
                </div>
                <div class="time-display" id="timeDisplay">--:--:--</div>
            </div>
        </header>

        <!-- Main Feature 1 Layout -->
        <main class="single-panel-layout">
            <div class="glass-card feature-container">
                <div class="card-header border-bottom">
                    <div class="card-title">
                        <div class="card-icon cpu-icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trending-up"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                        </div>
                        <div>
                            <h2>今日台股強勢漲停個股</h2>
                            <p class="subtitle">自動過濾當日漲幅達限制幅度 (+10%) 之熱門交易標的</p>
                        </div>
                    </div>
                    
                    <button class="shortcut-btn refresh-btn" id="refreshStocks">
                        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-refresh-cw"><path d="M21 12a9 9 0 0 0-9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M3 12a9 9 0 0 0 9 9 9.75 9.75 0 0 0 6.74-2.74L21 16"/><path d="M16 16h5v5"/></svg>
                        <span>重新整理</span>
                    </button>
                </div>

                <div class="table-scroll-container">
                    <table class="glass-table">
                        <thead>
                            <tr>
                                <th>股票代號</th>
                                <th>股名</th>
                                <th>當前價 (元)</th>
                                <th>漲跌</th>
                                <th>幅度</th>
                                <th>成交量 (張)</th>
                                <th>產業類別</th>
                                <th>狀態</th>
                            </tr>
                        </thead>
                        <tbody id="stockTableBody">
                            <!-- JS will inject rows here -->
                            <tr>
                                <td colspan="8">
                                    <div class="empty-state">
                                        <div class="spinner"></div>
                                        <p>正在加載今日漲停股票數據...</p>
                                    </div>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer-bar">
            <p>© 2026 Workspace Dashboard. Running on Python Flask server.</p>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
