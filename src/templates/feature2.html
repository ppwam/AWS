<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>下午上班公司看板 | Workspace Hub</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <!-- Premium glowing background accents -->
    <div class="glow-blob blob-purple"></div>
    <div class="glow-blob blob-blue"></div>
    <div class="glow-blob blob-teal"></div>

    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="logo-area">
                <div class="logo-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-activity"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
                </div>
                <div>
                    <h1>Workspace Hub</h1>
                    <p class="subtitle">System Realtime Performance Monitor</p>
                </div>
            </div>

            <!-- Multi-tab Navigation Bar -->
            <nav class="app-nav">
                <a href="/" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-layout-dashboard"><rect width="7" height="9" x="3" y="3" rx="1"/><rect width="7" height="5" x="14" y="3" rx="1"/><rect width="7" height="9" x="14" y="12" rx="1"/><rect width="7" height="5" x="3" y="16" rx="1"/></svg>
                    <span>系統監控</span>
                </a>
                <a href="/feature1" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-trending-up"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
                    <span>台股漲停看板</span>
                </a>
                <a href="/feature2" class="nav-item active">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building-2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M6 18h12"/><path d="M6 14h12"/><path d="M6 10h12"/><path d="M6 6h12"/></svg>
                    <span>下午上班公司</span>
                </a>
                <a href="/feature3" class="nav-item">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-cloud-upload"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></svg>
                    <span>S3 雲端上傳</span>
                </a>
            </nav>
            
            <div class="header-status">
                <div class="status-indicator">
                    <span class="status-dot online" id="statusDot"></span>
                    <span class="status-text" id="statusText">連線正常</span>
                </div>
                <div class="time-display" id="timeDisplay">--:--:--</div>
            </div>
        </header>

        <!-- Main Feature 2 Layout -->
        <main class="single-panel-layout">
            <div class="feature-header-area">
                <div class="title-with-desc">
                    <div class="card-icon disk-icon inline-icon">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-building-2"><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18"/><path d="M6 18h12"/><path d="M6 14h12"/><path d="M6 10h12"/><path d="M6 6h12"/></svg>
                    </div>
                    <h2>下午上班公司狀態表</h2>
                    <p class="subtitle">追蹤各大科技指標企業下午時段（13:00 - 18:00）的辦公時段與現場出席率狀態</p>
                </div>
            </div>

            <!-- Companies Card Grid -->
            <div class="companies-grid" id="companiesGrid">
                <!-- Loading State -->
                <div class="glass-card loading-card-full">
                    <div class="empty-state">
                        <div class="spinner"></div>
                        <p>正在加載下午上班公司數據...</p>
                    </div>
                </div>
            </div>
        </main>

        <!-- Footer -->
        <footer class="app-footer-bar">
            <p>© 2026 Workspace Dashboard. Running on Python Flask server.</p>
        </footer>
    </div>

    <!-- Custom JS -->
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
